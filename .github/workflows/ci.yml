name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  test:
    name: Python ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
        python-version:
          - "3.10"
          - "3.12"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: CLI smoke
        run: |
          arbor version
          arbor demo --no-webui --rounds 1
          arbor cost --model claude-sonnet-4-6 --preset smoke

      - name: Test
        run: pytest
